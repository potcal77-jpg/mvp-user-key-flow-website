<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Grab - Biggest Deals</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Guntur:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="deals.css">
</head>
<body>

    <div class="app-container">
        
        <header class="app-header">
            <nav class="nav-links">
                <a href="home.html">Home</a>
                <a href="shop.html">Shop</a>
                <a href="deals.html" class="active">Deals</a>
            </nav>
            <div class="nav-icons">
                <i class="fa-solid fa-user profile-icon"></i>
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
            </div>
        </header>

        <main class="deals-content-area">
            <h2 class="deals-page-title">Biggest Deals</h2>
            
            <div class="deals-scroll-feed">
                <div class="mega-deal-card">
                    <h3 class="deal-card-title">Biggest Deals</h3>
                    <div class="deal-image-frame">
                        <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600&auto=format&fit=crop" alt="Premium Lunch Bento Box">
                        <div class="burst-discount-badge">75%<br>OFF</div>
                    </div>
                    <div class="deal-metadata">
                        <div class="rating-stars-row">
                            <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                        </div>
                        <p class="meta-row"><strong>Expires in 2 days</strong></p>
                        <p class="meta-row"><strong>Price: $7</strong></p>
                        <p class="meta-row"><strong>Distance: 35 minutes away</strong></p>
                    </div>
                    
                    <a href="deals-confirm.html" class="card-action-anchor">
                        <button class="grab-btn">Grab Now</button>
                    </a>
                </div>
            </div>

        </main>

        <footer class="app-footer">
            <p class="footer-copy">© 2026 Callan Potgieter. All Rights Reserved.</p>
            <div class="footer-links">
                <a href="#">Legal</a>
                <a href="#">Privacy Policy</a>
                <a href="#">Terms & Conditions</a>
                <a href="#">Contact Us</a>
            </div>
        </footer>

    </div>

</body>
